name: New Relic Fluent Bit Output Plugin - Merge to master

on:
  push:
    branches:
      - master

jobs:
  cd:
    name: Continuous Delivery pipeline
    runs-on: ubuntu-24.04

    steps:
      - name: Set up Go 1.23.6
        uses: actions/setup-go@v5 # Updated to v5 for better caching
        with:
          go-version: '1.23.6'

      - name: Check go version
        run: go version

      - name: Checkout code
        uses: actions/checkout@v4 # Updated to v4

      - name: Run unit tests
        run: go test ./...

      - name: Determine new plugin version
        run: |
          VERSION=$(cat version.go | grep VERSION | awk '{gsub(/"/, "", $4); print $4}')
          echo "Determined version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV       
      
      - name: Set up Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Build All Binaries (Zig)
        run: |
          echo "Starting Cross-Compilation with Zig..."
          
          # Array of targets: "GOOS GOARCH ZIG_TARGET OUTPUT_PREFIX EXTENSION"
          # We use glibc 2.26 for Linux to ensure compatibility with Amazon Linux 2
          targets=(
            "linux amd64 x86_64-linux-gnu.2.26 out_newrelic-linux-amd64 .so"
            "linux arm64 aarch64-linux-gnu.2.26 out_newrelic-linux-arm64 .so"
            "linux arm arm-linux-gnueabihf.2.26 out_newrelic-linux-arm .so"
            "windows amd64 x86_64-windows-gnu out_newrelic-windows-amd64 .dll"
            "windows 386 x86-windows-gnu out_newrelic-windows-386 .dll"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch zigtarget prefix ext <<< "$target"
            echo "Building for $goos/$goarch (Target: $zigtarget)..."
            
            CGO_ENABLED=1 GOOS=$goos GOARCH=$goarch \
            CC="zig cc -target $zigtarget" \
            CXX="zig c++ -target $zigtarget" \
            go build \
              -buildmode=c-shared \
              -ldflags="-s -w" \
              -o "${prefix}-${{ env.VERSION }}${ext}" \
              .
          done
          
          echo "Build complete. Artifacts:"
          ls -lh out_newrelic-*       

      # The QEMU will include more platforms such as arm64 to docker buildx builder
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3 # Updated to v3

      # The Docker Buildx builder will be used later to leverage from the cache while building the image
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3 # Updated to v3

      # Cache to be used by Docker Buildx
      - name: Set up Docker Buildx's cache
        uses: actions/cache@v4 # Updated to v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: ${{ runner.os }}-buildx-

      # - name: Login to Docker Hub
