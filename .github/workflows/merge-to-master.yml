          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./out_newrelic-windows-386-${{ env.VERSION }}.dll
          asset_name: out_newrelic-windows-386-${{ env.VERSION }}.dll
          asset_content_type: application/octet-stream

  build-arm:
    name: Build ARM binaries 
    needs: cd  # Wait for main job to create release first
    # ARM builds on Ubuntu 24.04 (GLIBC 2.39) - not AL2/RHEL8 compatible
    # Most ARM Linux systems use newer GLIBC anyway, separate builds acceptable
    runs-on: ubuntu-24.04
    env:
      VERSION: ${{ needs.cd.outputs.version }}

    steps:
      - name: Set up Go 1.25.6
        uses: actions/setup-go@93397bea11091df50f3d7e59dc26a7711a8bcfbe # v4
        with:
          go-version: '1.25.6'

      - name: Checkout code
        uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2

      - name: Install ARM cross-compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: Build project (Linux arm64)
        run: env make linux/arm64

      - name: Build project (Linux arm/v7)
        run: env make linux/arm/v7

      - name: Include linux-arm64 artifact in release
        uses: actions/upload-release-asset@e8f9f06c4b078e705bd2ea027f0926603fc9b4d5 # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.cd.outputs.upload_url }}
          asset_path: ./out_newrelic-linux-arm64-${{ needs.cd.outputs.version }}.so
          asset_name: out_newrelic-linux-arm64-${{ needs.cd.outputs.version }}.so
          asset_content_type: application/octet-stream

      - name: Include linux-arm artifact in release
        uses: actions/upload-release-asset@e8f9f06c4b078e705bd2ea027f0926603fc9b4d5 # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.cd.outputs.upload_url }}
          asset_path: ./out_newrelic-linux-arm-${{ needs.cd.outputs.version }}.so
          asset_name: out_newrelic-linux-arm-${{ needs.cd.outputs.version }}.so
          asset_content_type: application/octet-stream

  windows-docker-images:
    name:  ${{ matrix.name }} Docker image generation and publishing
    # We aim to support https://kubernetes.io/docs/setup/production-environment/windows/intro-windows-in-kubernetes/#windows-os-version-support
    # More info: https://cloud.google.com/kubernetes-engine/docs/how-to/creating-a-cluster-windows#choose_your_windows_server_node_image
    # Tag reference: https://hub.docker.com/_/microsoft-windows-servercore
    # Compatibility matrix: https://docs.microsoft.com/en-us/virtualization/windowscontainers/deploy-containers/version-compatibility
    strategy:
      matrix:
        include:
#          - name: Windows Server 2019 (LTSC)
#            windowsVersion: 2019
#            windowsImageTag: ltsc2019-amd64
#            imageTagSuffix: windows-ltsc-2019
#            # Uses self-hosted runner which has Hyper-V virtualization support, since windows-2019 GH runner was deprecated
#            runsOn: windows-x64-8-core
#            # More info on isolation: https://learn.microsoft.com/en-us/virtualization/windowscontainers/manage-containers/hyperv-container
#            isolation: hyperv
          - name: Windows Server 2022 (LTSC)
            windowsVersion: 2022
            windowsImageTag: ltsc2022-amd64
            imageTagSuffix: windows-ltsc-2022
            runsOn: windows-2022
            isolation: process

    runs-on: ${{ matrix.runsOn }}

    steps:
      - name: Checkout code
        uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2

      - name: Determine new plugin version
        run: |
          $env:VERSION=(Select-String -Path version.go -Pattern 'const VERSION = "(.*)"').Matches.Groups[1].Value
          echo "Determined version: $env:VERSION"
          # After the following command, the VERSION variable is available via the "env" command in the GH action
          Add-Content -Path $env:GITHUB_ENV -Value "VERSION=$env:VERSION"

      - name: Login to Docker Hub
        uses: docker/login-action@dd4fa0671be5250ee6f50aedf4cb05514abda2c7 # v1
        with:
          username: ${{ secrets.SVC_DOCKER_HUB_USERNAME }}
          password: ${{ secrets.SVC_DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Publish Docker image for ${{ matrix.name }}
        env:
          DOCKERHUB_REPOSITORY: newrelic/newrelic-fluentbit-output
          IMAGE_TAG: ${{ env.VERSION }}-${{ matrix.imageTagSuffix }}
        run: |
          docker build --platform windows/amd64 --isolation=${{ matrix.isolation }} -f Dockerfile.windows -t ${{ env.DOCKERHUB_REPOSITORY }}:${{ env.IMAGE_TAG }} --build-arg WINDOWS_VERSION=${{ matrix.windowsVersion }} .
          docker push ${{ env.DOCKERHUB_REPOSITORY }}:${{ env.IMAGE_TAG }}

  windows-docker-images-older-version:
    name:  ${{ matrix.name }} Docker image generation and publishing
    # Windows 2019 needs to run older version of fluent bit as base images are not being published after fluent bit 4.0.3
    # We aim to support https://kubernetes.io/docs/setup/production-environment/windows/intro-windows-in-kubernetes/#windows-os-version-support
    # More info: https://cloud.google.com/kubernetes-engine/docs/how-to/creating-a-cluster-windows#choose_your_windows_server_node_image
    # Tag reference: https://hub.docker.com/_/microsoft-windows-servercore
    # Compatibility matrix: https://docs.microsoft.com/en-us/virtualization/windowscontainers/deploy-containers/version-compatibility
    strategy:
      matrix:
        include:
          - name: Windows Server 2019 (LTSC)
            windowsVersion: 2019
            windowsImageTag: ltsc2019-amd64
            imageTagSuffix: windows-ltsc-2019
            # Uses self-hosted runner which has Hyper-V virtualization support, since windows-2019 GH runner was deprecated
            runsOn: windows-x64-8-core
            # More info on isolation: https://learn.microsoft.com/en-us/virtualization/windowscontainers/manage-containers/hyperv-container
            isolation: hyperv

    runs-on: ${{ matrix.runsOn }}

    steps:
      - name: Checkout code
        uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2

      - name: Determine new plugin version
        run: |
          $env:VERSION=(Select-String -Path version.go -Pattern 'const VERSION = "(.*)"').Matches.Groups[1].Value
          echo "Determined version: $env:VERSION"
          # After the following command, the VERSION variable is available via the "env" command in the GH action
          Add-Content -Path $env:GITHUB_ENV -Value "VERSION=$env:VERSION"

      - name: Login to Docker Hub
        uses: docker/login-action@dd4fa0671be5250ee6f50aedf4cb05514abda2c7 # v1
        with:
          username: ${{ secrets.SVC_DOCKER_HUB_USERNAME }}
          password: ${{ secrets.SVC_DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Publish Docker image for ${{ matrix.name }}
        env:
          DOCKERHUB_REPOSITORY: newrelic/newrelic-fluentbit-output
          IMAGE_TAG: ${{ env.VERSION }}-${{ matrix.imageTagSuffix }}
        run: |
          docker build --platform windows/amd64 --isolation=${{ matrix.isolation }} -f Dockerfile.windows_older -t ${{ env.DOCKERHUB_REPOSITORY }}:${{ env.IMAGE_TAG }} --build-arg WINDOWS_VERSION=${{ matrix.windowsVersion }} .
          docker push ${{ env.DOCKERHUB_REPOSITORY }}:${{ env.IMAGE_TAG }}

