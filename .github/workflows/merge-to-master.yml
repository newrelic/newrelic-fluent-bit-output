name: New Relic Fluent Bit Output Plugin - Merge to master

on:
  push:
    branches:
      - NR-517619-rhel8-support

jobs:
  cd:
    name: Continuous Delivery pipeline
    # Using Ubuntu 24.04 as runner, builds happen in Amazon Linux 2 Docker container
    # Amazon Linux 2 has GLIBC 2.26, which works on both AL2 (2.26) and RHEL8 (2.28)
    # Supported until June 2025, covers the oldest target system (Amazon Linux 2)
    runs-on: ubuntu-24.04
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.set_version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2

      - name: Determine new plugin version
        id: set_version
        run: |
          VERSION=$(cat version.go | grep VERSION | awk '{gsub(/"/, "", $4); print $4}')
          echo "Determined version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build in Amazon Linux 2 container (Linux amd64, Windows)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e VERSION=${{ env.VERSION }} \
            amazonlinux:2 \
            bash -c "
              set -e
              # Install build dependencies
              yum install -y git make gcc gcc-c++ diffutils wget tar glibc-devel
              
              # Install EPEL and mingw compilers for Windows cross-compilation
              # Amazon Linux 2 uses amazon-linux-extras for EPEL, not EPEL 7 RPM
              amazon-linux-extras install epel -y
              yum install -y mingw64-gcc mingw32-gcc
              
              # Install Go 1.25.6
              cd /tmp
              wget -q https://go.dev/dl/go1.25.6.linux-amd64.tar.gz
              tar -C /usr/local -xzf go1.25.6.linux-amd64.tar.gz
              export PATH=/usr/local/go/bin:\$PATH
              
              # Verify Go version
              go version
              
              # Go back to workspace
              cd /workspace
              
              # Run tests
              go test ./...
              
              # Build Linux amd64 (GLIBC 2.26 compatible)
              make linux/amd64
              
              # Build Windows binaries
              make windows/386
              make windows/amd64
              
              # Fix permissions (Docker creates files as root)
              chown -R $(id -u):$(id -g) .
            "
      
      - name: Verify build artifacts
        run: |
          ls -lh out_newrelic-linux-amd64-${{ env.VERSION }}.so
          ls -lh out_newrelic-windows-*-${{ env.VERSION }}.dll

